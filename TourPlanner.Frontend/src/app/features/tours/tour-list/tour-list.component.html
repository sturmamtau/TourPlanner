<div class="tour-list-container">
  <h2 class="tour-heading">Meine Touren</h2>
  
  <div class="button-container">
    <button (click)="onShowForm()" class="add-tour-button">
      + Neue Tour erstellen
    </button>
  </div>

  <div class="tour-items-wrapper">
    <div *ngIf="tours.length === 0" style="padding: 20px; color: var(--color-text-tertiary); font-style: italic; font-size: 13px;">
      Keine Touren gefunden...
    </div>
    
    <div *ngFor="let tour of tours" 
         class="tour-item" 
         [class.active]="selectedTourId === tour.id"
         (click)="selectTour(tour)">
      
      <span class="tour-name">{{tour.name}}</span>
      
      <span class="tour-route">
        {{tour.from}} <span style="color: #ccc;">→</span> {{tour.to}}
      </span>
      
      <span class="tour-transport-type">
        {{tour.transportType}}
      </span>
      
    </div>
  </div>
</div>
