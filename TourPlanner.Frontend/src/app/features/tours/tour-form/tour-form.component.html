<div class="form-container">
  <h3>Neue Tour erstellen</h3>

  <div class="form-group">
    <label>Id</label>
    <input [(ngModel)]="formData.id" name="id" placeholder="Tour Id" />
  </div>
  <div class="form-group">
    <label>Name</label>
    <input [(ngModel)]="formData.name" name="name" placeholder="Tour Name" />
  </div>

  <div class="form-group">
    <label>Beschreibung</label>
    <input [(ngModel)]="formData.description" name="description" placeholder="Beschreibung" />
  </div>

  <div class="form-group">
    <label>Von</label>
    <input [(ngModel)]="formData.from" name="from" placeholder="Startort" />
  </div>

  <div class="form-group">
    <label>Nach</label>
    <input [(ngModel)]="formData.to" name="to" placeholder="Zielort" />
  </div>

  <div class="form-group">
    <label>Transport Typ</label>
    <select [(ngModel)]="formData.transportType" name="transportType">
      <option *ngFor="let type of transportTypeOptions" [value]="type">{{ type }}</option>
    </select>
  </div>

  <div class="form-actions">
    <button (click)="onSubmit()">Speichern</button>
    <button (click)="onCancel()">Abbrechen</button>
  </div>
</div>
